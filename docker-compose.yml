version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-joule}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-joule}
      - POSTGRES_DB=${POSTGRES_DB:-joulejournal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-joule} -d ${POSTGRES_DB:-joulejournal}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PORT=${PORT:-5201}
    ports:
      - "${PORT:-5201}:${PORT:-5201}"
    environment:
      - PORT=${PORT:-5201}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-joule}:${POSTGRES_PASSWORD:-joule}@db:5432/${POSTGRES_DB:-joulejournal}
      - PYTHONPATH=/app
    command: /app/scripts/start.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-5201}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
    driver: local
