version: '3.8'

services:
  backend:
    build:
      context: .
      args:
        - PORT=${PORT:-5201}
    ports:
      - "${PORT:-5201}:${PORT:-5201}"
    environment:
      - PORT=${PORT:-5201}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: always

volumes:
  postgres_data:
