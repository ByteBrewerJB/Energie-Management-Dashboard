<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JouleJournal - Energie Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Placeholder for icon library -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
</head>
<body>
    <header>
        <h1>JouleJournal</h1>
        <div class="theme-switcher-container">
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider round"></span>
            </label>
            <span id="theme-label">Dark Mode</span>
        </div>
    </header>

    <main>
        <div class="main-toolbar">
            <div class="period-selector">
                <select id="year-selector" class="form-control">
                    <!-- Jaren worden hier dynamisch geladen -->
                </select>
                <select id="month-selector" class="form-control">
                    <!-- Maanden worden hier dynamisch geladen -->
                </select>
                <button id="load-journal-button" class="btn-primary">Laad Journaal</button>
            </div>
            <button id="toggle-journal-form" class="btn-secondary">Nieuw Journaal</button>
        </div>

        <!-- Formulier voor nieuw maandjournaal (verborgen standaard) -->
        <div class="card form-container" id="journal-form-container" style="display: none;">
            <h2>Nieuw Maandjournaal</h2>
            <form id="journal-form">
                <div class="form-grid">
                    <!-- Periode -->
                    <div class="form-section">
                        <h3>Periode</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="journal-year">Jaar</label>
                                <input type="number" id="journal-year" name="year" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="journal-month">Maand</label>
                                <input type="number" id="journal-month" name="month" class="form-control" required>
                            </div>
                        </div>
                    </div>

                    <!-- Netverbruik -->
                    <div class="form-section">
                        <h3>Netverbruik (kWh)</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="grid_consumption_low_kwh">Daluren Verbruik</label>
                                <input type="number" step="0.01" id="grid_consumption_low_kwh" name="grid_consumption_low_kwh" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="grid_consumption_high_kwh">Piekuren Verbruik</label>
                                <input type="number" step="0.01" id="grid_consumption_high_kwh" name="grid_consumption_high_kwh" class="form-control">
                            </div>
                        </div>
                         <div class="form-row">
                            <div class="form-group">
                                <label for="grid_feed_in_low_kwh">Daluren Teruglevering</label>
                                <input type="number" step="0.01" id="grid_feed_in_low_kwh" name="grid_feed_in_low_kwh" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="grid_feed_in_high_kwh">Piekuren Teruglevering</label>
                                <input type="number" step="0.01" id="grid_feed_in_high_kwh" name="grid_feed_in_high_kwh" class="form-control">
                            </div>
                        </div>
                    </div>

                    <!-- Tarieven -->
                    <div class="form-section">
                        <h3>Tarieven (€/kWh)</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="consumption_price_low_eur_kwh">Daluren Consumptieprijs</label>
                                <input type="number" step="0.0001" id="consumption_price_low_eur_kwh" name="consumption_price_low_eur_kwh" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="consumption_price_high_eur_kwh">Piekuren Consumptieprijs</label>
                                <input type="number" step="0.0001" id="consumption_price_high_eur_kwh" name="consumption_price_high_eur_kwh" class="form-control">
                            </div>
                        </div>
                        <div class="form-row">
                             <div class="form-group">
                                <label for="feed_in_tariff_low_eur_kwh">Daluren Teruglevertarief</label>
                                <input type="number" step="0.0001" id="feed_in_tariff_low_eur_kwh" name="feed_in_tariff_low_eur_kwh" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="feed_in_tariff_high_eur_kwh">Piekuren Teruglevertarief</label>
                                <input type="number" step="0.0001" id="feed_in_tariff_high_eur_kwh" name="feed_in_tariff_high_eur_kwh" class="form-control">
                            </div>
                        </div>
                    </div>

                    <!-- Productie & Verbruik -->
                    <div class="form-section">
                        <h3>Interne Productie & Verbruik</h3>
                         <div class="form-row">
                            <div class="form-group">
                                <label for="solar_production_kwh">Zonneproductie (kWh)</label>
                                <input type="number" step="0.01" id="solar_production_kwh" name="solar_production_kwh" class="form-control">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="battery_charge_kwh">Batterij Opladen (kWh)</label>
                                <input type="number" step="0.01" id="battery_charge_kwh" name="battery_charge_kwh" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="battery_discharge_kwh">Batterij Ontladen (kWh)</label>
                                <input type="number" step="0.01" id="battery_discharge_kwh" name="battery_discharge_kwh" class="form-control">
                            </div>
                        </div>
                    </div>

                    <!-- Financieel -->
                    <div class="form-section">
                        <h3>Financieel</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="monthly_prepayment_eur">Voorschot (€)</label>
                                <input type="number" step="0.01" id="monthly_prepayment_eur" name="monthly_prepayment_eur" class="form-control">
                            </div>
                        </div>
                    </div>

                    <!-- Autogebruik -->
                    <div class="form-section" id="car-charging-section">
                        <h3>Autogebruik</h3>
                        <!-- Dynamische velden voor auto's worden hier ingevoegd -->
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Journaal Opslaan</button>
                    <button type="button" id="cancel-journal-form" class="btn-secondary">Annuleren</button>
                </div>
            </form>
        </div>

        <!-- Resultaten Sectie -->
        <div id="results-section" style="display: none;">
            <div class="card" id="kpi-card">
                <h2 id="kpi-title"><i data-feather="bar-chart-2"></i> Kerncijfers</h2>
                <div id="kpis" class="kpi-grid">
                    <!-- KPI data wordt hier geladen -->
                </div>
            </div>

            <div class="card" id="financial-statement-card">
                 <h2><i data-feather="file-text"></i> Financieel Overzicht</h2>
                 <div id="financial-statement" class="kpi-grid">
                     <!-- Financieel overzicht wordt hier geladen -->
                 </div>
            </div>
        </div>

        <div class="card" id="roi-card">
            <h2><i data-feather="trending-up"></i> Return on Investment (ROI) Tracker</h2>
            <div id="roi-tracker">
                <!-- ROI voortgangsbalk wordt hier geladen -->
            </div>
        </div>


        <div class="chart-grid">
            <div class="card chart-container">
                <canvas id="energyBalanceChart"></canvas>
            </div>
            <div class="card chart-container">
                <canvas id="consumptionSplitChart"></canvas>
            </div>
            <div class="card chart-container full-width">
                <canvas id="productionForecastChart"></canvas>
            </div>
        </div>
    </main>

    <footer>
        <p>JouleJournal Dashboard v1.0 | <a href="/admin">Admin Portal</a></p>
    </footer>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <script>
      // To replace icons later
      feather.replace();
    </script>
</body>
</html>
