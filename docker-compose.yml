version: '3.8'

services:
  backend:
    build:
      context: .
      args:
        - PORT=${PORT:-5201}
    ports:
      - "${PORT:-5201}:${PORT:-5201}"
    environment:
      - PORT=${PORT:-5201}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DATABASE_URL=sqlite:///joulejournal.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - BACKEND_CORS_ORIGINS=http://localhost:${PORT:-5201},http://127.0.0.1:${PORT:-5201},http://192.168.0.178:${PORT:-5201}
    command: >
      bash -lc "
        set -euxo pipefail
        echo '--- Running database migrations ---'
        alembic upgrade head
        echo '--- Database migrations complete ---'
        echo '--- NOTE: Database seeding is now handled manually via the admin interface. ---'
        echo '--- Starting web server ---'
        uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-5201}
      "
    restart: always
