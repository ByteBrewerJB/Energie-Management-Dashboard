<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registreren - JouleJournal</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}" />
</head>
<body class="auth-body">
    <section class="auth-card">
        <h1>Account aanmaken</h1>
        <p class="auth-subtitle">Start met het tracken van je energie-investeringen.</p>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/register" class="auth-form">
            <label>Volledige naam
                <input type="text" name="full_name" autocomplete="name" />
            </label>
            <label>E-mailadres
                <input type="email" name="email" required autocomplete="email" />
            </label>
            <label>Wachtwoord
                <input type="password" name="password" required autocomplete="new-password" />
            </label>
            <label>Herhaal wachtwoord
                <input type="password" name="confirm_password" required autocomplete="new-password" />
            </label>
            <button type="submit" class="btn-primary">Registreren</button>
        </form>
        <p class="auth-footer">Al een account? <a href="/login">Log in</a>.</p>
    </section>
</body>
</html>
