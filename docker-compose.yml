version: '3.8'

services:
  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=joule
      - POSTGRES_PASSWORD=joule
      - POSTGRES_DB=joulejournal
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    ports:
      - "5201:8000"
    environment:
      - DATABASE_URL=postgresql://joule:joule@db/joulejournal
      - PYTHONPATH=/app
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local
