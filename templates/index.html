<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JouleJournal - Energie Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>JouleJournal</h1>
        <p>Een dashboard voor het monitoren van uw energieverbruik en -productie.</p>
    </header>

    <main>
        <section id="kpi-container">
            <h2>Kerncijfers (Huidig Jaar)</h2>
            <div id="kpis" class="kpi-grid">
                <!-- KPI data wordt hier geladen door JavaScript -->
            </div>
        </section>

        <section id="roi-tracker-container">
            <h2>Return on Investment (ROI) Tracker</h2>
            <div id="roi-tracker">
                <!-- ROI voortgangsbalk wordt hier geladen -->
            </div>
        </section>

        <div class="chart-grid">
            <div class="chart-container">
                <canvas id="energyBalanceChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="consumptionSplitChart"></canvas>
            </div>
            <div class="chart-container full-width">
                <canvas id="productionForecastChart"></canvas>
            </div>
        </div>
    </main>

    <footer>
        <p>JouleJournal Dashboard v1.0 | <a href="/admin">Admin Login</a></p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
