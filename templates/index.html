<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JouleJournal - Energie Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Placeholder for icon library -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
</head>
<body>
    <header>
        <h1>JouleJournal</h1>
        <div class="theme-switcher-container">
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider round"></span>
            </label>
            <span id="theme-label">Dark Mode</span>
        </div>
    </header>

    <main>
        <!-- The sections are now wrapped in a div with class="card" -->
        <div class="card" id="kpi-card">
            <h2><i data-feather="bar-chart-2"></i> Kerncijfers (Huidig Jaar)</h2>
            <div id="kpis" class="kpi-grid">
                <!-- KPI data wordt hier geladen door JavaScript -->
            </div>
        </div>

        <div class="card" id="roi-card">
            <h2><i data-feather="trending-up"></i> Return on Investment (ROI) Tracker</h2>
            <div id="roi-tracker">
                <!-- ROI voortgangsbalk wordt hier geladen -->
            </div>
        </div>

        <div class="chart-grid">
            <div class="card chart-container">
                <canvas id="energyBalanceChart"></canvas>
            </div>
            <div class="card chart-container">
                <canvas id="consumptionSplitChart"></canvas>
            </div>
            <div class="card chart-container full-width">
                <canvas id="productionForecastChart"></canvas>
            </div>
        </div>
    </main>

    <footer>
        <p>JouleJournal Dashboard v1.0 | <a href="/admin">Admin Portal</a></p>
    </footer>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <script>
      // To replace icons later
      feather.replace();
    </script>
</body>
</html>
